name: Release

on:
  push:
    tags: ['v*', '[0-9]*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name to release (e.g. 1.0.0). Leave empty to dry-run without publishing.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: mac
          - os: windows-latest
            target: win

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/Library/Caches/electron
            ~\AppData\Local\electron\Cache
          key: electron-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-${{ runner.os }}-

      - run: npm ci

      - name: Build ${{ matrix.target }}
        run: npm run dist:${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: lens-${{ matrix.target }}
          path: |
            release/*.zip
          if-no-files-found: ignore
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag' || inputs.tag != ''
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -lh artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: ${{ inputs.tag || github.ref_name }}
          files: artifacts/*
          generate_release_notes: true
          prerelease: ${{ contains(inputs.tag || github.ref_name, '-') }}
          fail_on_unmatched_files: true
